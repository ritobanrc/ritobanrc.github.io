# Welcome to Jekyll!
#
# This config file is meant for settings that affect your whole blog, values
# which you are expected to set up once and rarely edit after that. If you find
# yourself editing this file very often, consider using Jekyll's data files
# feature for the data you need to update frequently.
#
# For technical reasons, this file is *NOT* reloaded automatically when you use
# 'bundle exec jekyll serve'. If you change this file, please restart the server process.
#
# If you need help with YAML syntax, here are some quick references for you: 
# https://learn-the-web.algonquindesign.ca/topics/markdown-yaml-cheat-sheet/#yaml
# https://learnxinyminutes.com/docs/yaml/
#
# Site settings
# These are used to personalize your new site. If you look in the HTML files,
# you will see them accessed via {{ site.title }}, {{ site.email }}, and so on.
# You can create any custom variable you would like, and they will be accessible
# in the templates via {{ site.myvariable }}.

title: Ritoban
email: ritobanrc@gmail.com
description: >- # this means to ignore newlines until "baseurl:"
  Ritoban's blog. Featuring posts about random stuff like politics and math and whatever's on my mind at the moment.
baseurl: "" # the subpath of your site, e.g. /blog
url: "" # the base hostname & protocol for your site, e.g. http://example.com
github_username:  ritobanrc

# Build settings
#theme: minima
remote_theme: daattali/beautiful-jekyll@5.0.0
plugins:
  - jekyll-feed
  - jekyll-remote-theme

navbar-links:
  Home: "index"
  About Me: "about"
  Politics: "politics"
  Book Reviews: "books"
  Resume: "resume"

social-network-links:
  email: "ritobanrc@gmail.com"
  rss: true
  github: ritobanrc
  reddit: ritobanrc
  discord: users/ritobanrc#4105 

rss-description: Ritoban's Blog. I post about random stuff like programming and politics and math and whatever comes to my mind at the moment.

url-pretty: "ritobanrc.github.io"
  #
# Excerpt word length - Truncate the excerpt of each post on the feed page to the specified number of words
excerpt_length: 50
# Whether or not to show an excerpt for every blog post in the feed page
feed_show_excerpt: true
# Whether or not to show a list of tags below each post preview in the feed page
feed_show_tags: false
# Add a search button to the navbar
post_search: true


navbar-col: "#111111"
navbar-text-col: "#89AA83"
navbar-border-col: "#5CAA4D"
page-col: "#212121"
text-col: "#EFEFEF"
link-col: "#008AFF"
hover-col: "#63D6FF"
footer-col: "#111111"
footer-text-col: "#EEEEEE"
footer-link-col: "#404040"
footer-hover-col: "#0085A1"

defaults:
  -
    scope:
      path: ""
      type: "posts"
    values:
      layout: "post"
      comments: true  # add comments to all blog posts
      social-share: true # add social media sharing buttons to all blog posts
  -
    scope:
      path: "" # any file that's not a post will be a "page" layout by default
    values:
      layout: "page"

# Exclude from processing.
# The following items will not be processed, by default.
# Any item listed under the `exclude:` key here will be automatically added to
# the internal "default list".
#
# Excluded items can be processed by explicitly listing the directories or
# their entries' file path in the `include:` list.
#
# exclude:
#   - .sass-cache/
#   - .jekyll-cache/
#   - gemfiles/
#   - Gemfile
#   - Gemfile.lock
#   - node_modules/
#   - vendor/bundle/
#   - vendor/cache/
#   - vendor/gems/
#   - vendor/ruby/
